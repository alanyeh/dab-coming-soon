<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="DAB — climbing goods. Coming soon." />
  <title>DAB — Coming Soon</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <main class="site">
    <header class="header">
      <a class="brand" href="#" aria-label="DAB home">
        <img src="assets/images/dab-logo.svg" alt="DAB" />
      </a>
      <div class="header-meta">
        <span class="status">Coming soon</span>
      </div>
    </header>

    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-copy">
        <div class="model-shell">
          <h1 id="hero-title" class="sr-only">DAB Block 01</h1>
          <div class="model-stage" id="model-stage" aria-label="Interactive 3D model of DAB Block 01">
            <canvas id="model-canvas"></canvas>
            <div class="model-status" id="model-status" role="status" aria-live="polite">Loading model</div>
          </div>
        </div>

        <div class="hero-bottom">
          <p class="intro">
            DAB makes considered climbing tools for warm-ups, training days,
            and the moments between attempts. Designed by climbers. Made to move.
          </p>
        </div>
      </div>

      <aside class="signup-panel" aria-label="Launch signup" hidden>
        <div class="object-stage" aria-hidden="true">
          <div class="orbit"></div>
          <img class="product-image" src="assets/images/dab-block.png" alt="" />
        </div>

        <div class="signup">
          <h2>First drop, soon.</h2>
          <p>Join the list for launch access and early product updates.</p>
          <form id="signup-form" novalidate>
            <div class="form-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="Email address" aria-label="Email address" required />
              <button type="submit">Notify me <span class="arrow">↗</span></button>
            </div>
            <div class="message" id="form-message" role="status" aria-live="polite"></div>
          </form>
        </div>
      </aside>
    </section>

    <footer class="footer">
      <img class="wordmark" src="assets/images/dab-logo.svg" alt="DAB" />
      <div class="footer-meta">
        <span class="footer-edition">Edition 001<br />New York 2026</span>
      </div>
    </footer>
  </main>
  <script src="assets/js/main.js" defer></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="assets/js/model-viewer.js"></script>
</body>
</html>
